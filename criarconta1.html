<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- BOOTSTRAP CSS -->
    <link rel="stylesheet" href="../CSS/bootstrap.css">

    <!-- LIGAÇÃO AOS FICHEIROS DE ESTILOS PRÓPRIOS -->
    <link rel="stylesheet" href="../CSS/estilos.css">
    <title>Criar conta 1</title>
     
</head>
<body class="landing-page">
    <header>
        <img src="../ASSETS/resharelogo.png" alt="logo" />
    </header>

    <main >
        <div class="bg-claro p-4 rounded">
        <h2>Criar Conta</h2>
        <form id="formulario1" action="criarconta2.html" method="get">
            <label for="name">Nome Completo</label>
            <input type="text" id="name" name="nome" placeholder="Insira o seu nome completo" required>
        
            <label for="data">Data de nascimento</label>
            <input type="date" id="data" name="data" placeholder="Insira a sua data de nascimento" required>
        
            <label for="localidade">Localidade</label>
            <select id="localidade" name="localidade" required>
                <option value="" disabled selected>Escolha a sua localidade</option>
                <option value="Aveiro">Aveiro</option>
                <option value="Beja">Beja</option>
                <option value="Braga">Braga</option>
                <option value="Braga">Braga</option>
                <option value="Bragança">Bragança</option>
                <option value="Castelo_Branco">Castelo Branco</option>
                <option value="Coimbra">Coimbra</option>
                <option value="Evora">Évora</option>
                <option value="Faro">Faro</option>
                <option value="Guarda">Guarda</option>
                <option value="Leiria">Leiria</option>
                <option value="Lisboa">Lisboa</option>
                <option value="Portalegre">Portalegre</option>
                <option value="Porto">Porto</option>
                <option value="Santarem">Santarém</option>
                <option value="Setubal">Setúbal</option>
                <option value="Viana_do_Castelo">Viana do Castelo</option>
                <option value="Vila_Real">Vila Real</option>
                <option value="Viseu">Viseu</option>


              </select>
            <button type="submit" class="btn-submit" id="botao1"> Seguinte</button>
        </form>

        <div class="separator">
            <span>OR</span>
        </div>

        <div class="social-login">

        <p>
            Já tem conta? <a href="#login.html" class="forgot-password">Login</a>
        </p>
    </div>
    </main>
